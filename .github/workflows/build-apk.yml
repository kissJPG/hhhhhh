name: Build Fanqie Downloader APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        default: '1.0.0'

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm ci

      - name: Initialize Capacitor Android
        run: |
          npx cap init "番茄下载器" "com.fanqie.downloader" --web-dir=app
          npx cap add android

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Build release APK
        working-directory: ./android
        run: ./gradlew assembleRelease
        continue-on-error: true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fanqie-downloader-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanqie-downloader-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '1.0.0' }}
          name: 番茄下载器 v${{ github.event.inputs.version || '1.0.0' }}
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
