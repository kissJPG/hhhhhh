name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - 'package.json'
      - 'capacitor.config.json'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name'
        required: false
        default: '1.0.0'

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  APP_NAME: 'fanqie-downloader'

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android @capacitor/filesystem

      - name: Initialize Capacitor
        run: |
          npx cap init fanqie-downloader com.fanqie.downloader --web-dir=app
          npx cap add android

      - name: Update version
        if: github.event.inputs.version != ''
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "Setting version to $VERSION"
          # Update Android version
          sed -i "s/versionName \"1.0\"/versionName \"$VERSION\"/g" android/app/build.gradle

      - name: Build Android APK (Debug)
        working-directory: android
        run: |
          ./gradlew assembleDebug

      - name: Build Android APK (Release)
        working-directory: android
        run: |
          ./gradlew assembleRelease || echo "Release build skipped (no keystore configured)"
        continue-on-error: true

      - name: Copy APK to output
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/fanqie-downloader-debug.apk 2>/dev/null || true
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk output/fanqie-downloader-release-unsigned.apk 2>/dev/null || true
          ls -lh output/

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fanqie-downloader-debug
          path: output/fanqie-downloader-debug.apk
          retention-days: 30

      - name: Upload release APK as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanqie-downloader-release
          path: output/fanqie-downloader-release-unsigned.apk
          retention-days: 30

      # Optional: Create GitHub Release
      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '1.0' }}-${{ github.run_number }}
          name: 番茄下载器 v${{ github.event.inputs.version || '1.0' }} Build ${{ github.run_number }}
          files: |
            output/*.apk
          draft: false
          prerelease: true
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
