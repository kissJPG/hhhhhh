<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>番茄下载器</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-container">
  <!-- 顶部栏 -->
  <header class="header">
    <h1 class="logo">🍅 番茄下载器</h1>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="输入书名、作者或链接..." autocomplete="off">
      <button id="searchBtn" class="btn-primary">搜索</button>
    </div>
  </header>

  <!-- 内容区 -->
  <main class="main-content" id="mainContent">
    <!-- 搜索结果 -->
    <section id="searchResults" class="results-section hidden">
      <h2>搜索结果</h2>
      <div id="resultsList" class="card-list"></div>
    </section>

    <!-- 书籍详情 -->
    <section id="bookDetail" class="detail-section hidden">
      <button id="backBtn" class="btn-back">← 返回</button>
      <div class="book-info-card card">
        <div class="book-header">
          <img id="bookCover" class="book-cover" src="assets/placeholder.svg" alt="封面">
          <div class="book-meta">
            <h2 id="bookTitle"></h2>
            <p id="bookAuthor"></p>
            <p id="bookStatus"></p>
            <p id="bookWords"></p>
          </div>
        </div>
        <p id="bookDesc" class="book-desc"></p>
        <div class="action-bar">
          <button id="downloadAllBtn" class="btn-primary btn-lg">下载全部章节</button>
          <button id="selectChaptersBtn" class="btn-secondary btn-lg">选择章节</button>
        </div>
      </div>

      <!-- 章节列表 -->
      <div class="chapter-section">
        <h3>目录 <span id="chapterCount"></span></h3>
        <div class="chapter-controls">
          <button id="selectAllCh" class="btn-sm">全选</button>
          <button id="deselectAllCh" class="btn-sm">取消全选</button>
          <button id="downloadSelected" class="btn-sm btn-primary">下载选中</button>
        </div>
        <div id="chapterList" class="chapter-list"></div>
      </div>
    </section>

    <!-- 下载管理 -->
    <section id="downloadManager" class="download-section hidden">
      <h2>下载管理</h2>
      <div id="downloadQueue" class="download-queue"></div>
    </section>

    <!-- 空状态 -->
    <div id="emptyState" class="empty-state">
      <img src="assets/empty.svg" alt="空" class="empty-icon">
      <p>搜索你喜欢的番茄小说，一键下载</p>
    </div>
  </main>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="search"><span>🔍</span> 搜索</button>
    <button class="nav-item" data-tab="downloads"><span>📥</span> 下载</button>
    <button class="nav-item" data-tab="settings"><span>⚙️</span> 设置</button>
  </nav>
</div>

<!-- Toast提示 -->
<div id="toast" class="toast hidden"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
